<div class="container mt-3">
	<form [formGroup]="userForm">
		<input type="hidden" name="id" value="1">

		<div class="row">
			<div class="col-md-6 mb-3">
				<label for="name" class="form-label">Name</label>
				<input formControlName="name" id="name" name="name"
					class="form-control" type="text" placeholder="Enter full name" value="">

					@if (userForm.controls['name'].touched || userForm.controls['name'].dirty) {
						<div class="text-danger">
							@if (userForm.controls['name'].errors?.['required']) {
								<span>This is required</span>
							} @else if (userForm.controls['name'].errors?.['minlength']) {
								<span>Min 4 Char Needed</span>
							}
						</div>
					}
			</div>

			<div class="col-md-6 mb-3">
				<label for="username" class="form-label">Username</label>
				<input formControlName="userName" id="username" name="username" class="form-control" type="text"
					placeholder="Enter username" value="">

			</div>

			<div class="col-md-6 mb-3">
				<label for="email" class="form-label">Email</label>
				<input formControlName="email" id="email" name="email" class="form-control" type="email"
					placeholder="name@example.com" value="">
			</div>

			<div class="col-md-6 mb-3">
				<label for="password" class="form-label">Password</label>
				<input formControlName="password" id="password" name="password" class="form-control" type="password"
					placeholder="Password" value="">
			</div>
		</div>

		<div class="d-flex gap-2">
			<button type="submit" [disabled]="userForm.invalid" class="btn btn-primary">Save</button>
			<button type="reset" class="btn btn-secondary">Reset</button>
		</div>
	</form>
</div>
