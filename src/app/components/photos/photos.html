<div class="row">
	<div class="col-8">
		<div class="card">
			<div class="card-header bg-primary">
				Photos List
			</div>
			<div class="card-body">
				<table class="table table-bordered">
					<thead>
						<tr>
							<th>Sr. No</th>
							<th>Album ID</th>
							<th>Title</th>
							<th>Url</th>
							<!-- <th>Thumbnail</th> -->
							<th>Action</th>
						</tr>
					</thead>
					<tbody>
						@for (photo of photosList; track $index) {
							<tr>
								<td> {{photo.id}} </td>
								<td> {{photo.albumId}} </td>
								<td> {{photo.title}} </td>
								<td> {{photo.url}} </td>
								<!-- <td> {{photo.thumbnailUrl}} </td> -->
								<td>
									<button class="btn btn-sm btn-success" (click)="onEditPhoto(photo)">Edit</button>
									<button class="btn btn-sm btn-danger" (click)="onDeletePhoto(photo)">Delete</button>
								</td>
							</tr>
						}
					</tbody>
				</table>
			</div>
		</div>
	</div>
	<div class="col-4">
		<div class="card">
			<div class="card-header bg-warning">
				Photos List
			</div>
			<div class="card-body">
				<form>
					-- ID: {{newPhoto.id}}
					<div class="row">
						<div class="col-12 py-2">
							<label>Album ID</label>
							<input type="text" name="albumId" [(ngModel)]="newPhoto.albumId" class="form-control">
						</div>
						<div class="col-12 py-2">
							<label>Title</label>
							<input type="text" name="title" [(ngModel)]="newPhoto.title" class="form-control">
						</div>
						<div class="col-12 py-2">
							<label>Url</label>
							<input type="text" name="url" [(ngModel)]="newPhoto.url" class="form-control">
						</div>
						<div class="col-12 py-2">
							<label>Thumbnail</label>
							<input type="text" name="thumbnailUrl" [(ngModel)]="newPhoto.thumbnailUrl" class="form-control">
						</div>
					</div>
					<div class="row pt-2">
						<div class="col-6">
							<button class="btn btn-secondary" (click)="clearForm()">Reset</button>
						</div>
						<div class="col-6">
							@if (newPhoto.id == 0) {
								<button class="btn btn-success" (click)="onSavePhoto()">Save</button>
							} @else {
								<button class="btn btn-warning" (click)="onUpdatePhoto(newPhoto)">Güncelle</button>
							}
						</div>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
